services:
  db:
    ports:
      - "${DB_PORT:-3307}:3306"

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin-container
    restart: always
    profiles: ["dev"]
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
      
    environment:
      PMA_HOST: db
      PMA_PASSWORD: ${DB_PASSWORD}
      PMA_ARBITRARY: 1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

