server {
    listen 80;
    server_name localhost;

    # On pointe vers le sous-dossier public
    root /var/www/public; 
    
    index index.php index.html;

    location / {
        # Si l'URL demandée n'existe pas, on peut soit renvoyer 404, 
        # soit tout rediriger vers index.php (pratique pour des URL propres)
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # Le SCRIPT_FILENAME doit utiliser le document_root (/var/www/public)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}