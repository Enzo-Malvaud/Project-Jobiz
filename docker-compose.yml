services:
  db:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-db_Vite_et_Gourmand}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: php-container
    restart: always
    volumes:
      - ./:/var/www/
      - /var/www/vendor/
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    env_file:
    - .env
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-db_Vite_et_Gourmand}
      - DB_USER=root



  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-container
    restart: always
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./:/var/www/
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3


volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: bridge

